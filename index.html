<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>91fx d0x</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:black;
    color:white;
    overflow:hidden;
}

/* Page d'entrée */
#enterPage{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:9999;
}

#enterPage img{
    width:500px;
    max-width:90%;
    margin-bottom:20px;
}

#enterPage button{
    margin-top:20px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

/* Page principale */
#mainPage{
    display:none;
    text-align:center;
    padding-top:20px;
    position:relative;
    z-index:2;
}

#mainPage img{
    width:320px;
    max-width:90%;
    display:block;
    margin:20px auto;
}

.logo{
    font-size:40px;
    margin-top:15px;
    text-shadow:
        0 0 10px white,
        0 0 20px white,
        0 0 40px white,
        0 0 60px white;
}

.info-btn{
    margin-top:20px;
    padding:12px 35px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

audio{
    margin-top:20px;
}

/* Neige */
.snow{
    position:fixed;
    top:-10px;
    color:white;
    pointer-events:none;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>
<body>

<!-- Écran d'entrée -->
<div id="enterPage">
    <img src="6EC670A9-E9B6-4900-ACAC-AFA4C805765F.jpeg" alt="">
    <h1>Clique sur entrer pour voir les infos de 91fx</h1>

    <button onclick="enterSite()">
        Entrer
    </button>
</div>

<!-- Contenu principal -->
<div id="mainPage">

    <img src="IMG_1512.jpeg" alt="">

    <img src="8022FC8F-4DD6-4483-93D8-A15C05A1A88B.jpeg" alt="">

    <div class="logo">91fx la lopsa qui fake screen pegasus et kazuna</div>

<a href="info.html">
    <button class="info-btn">Ses infos</button>
</a>

<br>

<a href="photo.html">
    <button class="info-btn" style="margin-top:10px;font-size:14px;padding:8px 20px;">
        PHOTO DE LUI
    </button>
</a>

<br><br>

<audio id="music" controls loop>
        <source src="brazil.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
function enterSite(){
    document.getElementById("enterPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";

    const music = document.getElementById("music");
    music.play().catch(()=>{});
}

// Neige
function createSnow(){
    const snow = document.createElement("div");

    snow.className = "snow";
    snow.innerHTML = "❄";

    snow.style.left = Math.random() * window.innerWidth + "px";
    snow.style.fontSize = (Math.random()*20+10) + "px";
    snow.style.animationDuration = (Math.random()*5+5) + "s";

    document.body.appendChild(snow);

    setTimeout(()=>{
        snow.remove();
    },10000);
}

setInterval(createSnow,150);
</script>

</body>
</html>
