<script>

function createBlood(){

    const blood=document.createElement("div");

    blood.style.left=Math.random()*window.innerWidth+"px";
    blood.style.animationDuration=(Math.random()*6+4)+"s";

    document
        .getElementById("blood-container")
        .appendChild(blood);

    setTimeout(()=>{
        blood.remove();
    },10000);
}

setInterval(createBlood,120);

function copyText(){

    const text=document.getElementById("txt");

    navigator.clipboard.writeText(text.value);

    alert("Texte copié !");
}

function downloadTxt(){

    const content=document.getElementById("txt").value;

    const blob=new Blob(
        [content],
        {type:"text/plain"}
    );

    const link=document.createElement("a");

    link.href=URL.createObjectURL(blob);
    link.download="91fx-info.txt";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(link.href);
}
