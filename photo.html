<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:black;
    color:white;
}

/* Écran d'entrée */
#enterPage{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#enterPage button{
    padding:15px 40px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

/* Galerie */
#mainPage{
    display:none;
    text-align:center;
    padding:20px;
}

.photo{
    width:90%;
    max-width:700px;
    display:block;
    margin:30px auto;
    border-radius:10px;
}

audio{
    margin:30px auto;
    display:block;
}
</style>
</head>
<body>

<div id="enterPage">
    <h1>Photos</h1>
    <button onclick="enterSite()">Entrer</button>
</div>

<div id="mainPage">

    <img src="IMG_1515.jpeg" class="photo" alt="">
    <img src="IMG_1514.jpeg" class="photo" alt="">
    <img src="IMG_1516.jpeg" class="photo" alt="">
    <img src="IMG_1504.jpeg" class="photo" alt="">
    <img src="IMG_1504.jpeg" class="photo" alt="">

    <audio id="music" controls loop>
        <source src="brazil.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
function enterSite(){
    document.getElementById("enterPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";

    const music = document.getElementById("music");
    music.play().catch(()=>{});
}
</script>

</body>
</html>
